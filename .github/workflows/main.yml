name: CDReader Chapter Checker

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in TEST MODE (no CDReader login, no submit — tests Gemini keys and prompt only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    - cron: '*/8 * * * *'

concurrency:
  group: cdreader-checker
  cancel-in-progress: false

jobs:
  check-chapters:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run checker
        env:
          CDREADER_EMAIL: ${{ secrets.CDREADER_EMAIL }}
          CDREADER_PASSWORD: ${{ secrets.CDREADER_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
          GEMINI_API_KEY_7: ${{ secrets.GEMINI_API_KEY_7 }}
          GEMINI_API_KEY_8: ${{ secrets.GEMINI_API_KEY_8 }}
          GEMINI_API_KEY_9: ${{ secrets.GEMINI_API_KEY_9 }}
          GEMINI_API_KEY_10: ${{ secrets.GEMINI_API_KEY_10 }}
          GEMINI_API_KEY_11: ${{ secrets.GEMINI_API_KEY_11 }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: python checker.py
